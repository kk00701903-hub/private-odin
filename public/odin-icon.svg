<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Odin Project">
  <defs>
    <radialGradient id="aura" cx="50%" cy="38%" r="65%">
      <stop offset="0%" stop-color="#00F0FF" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#05050A" stop-opacity="0"/>
    </radialGradient>
    <filter id="neon" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
