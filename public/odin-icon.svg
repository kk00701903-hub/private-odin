<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Odin">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#14102a"/>
      <stop offset="100%" stop-color="#07090f"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00D4FF"/>
      <stop offset="55%" stop-color="#7C6FFF"/>
      <stop offset="100%" stop-color="#FFAA2C"/>
    </linearGradient>
    <radialGradient id="eyeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00D4FF" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#00D4FF" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="96" fill="url(#sky)"/>

  <!-- stars -->
  <circle cx="96" cy="88" r="3" fill="#00D4FF" opacity="0.55"/>
  <circle cx="148" cy="64" r="2" fill="#7C6FFF" opacity="0.45"/>
  <circle cx="392" cy="72" r="2.5" fill="#00D4FF" opacity="0.5"/>
  <circle cx="420" cy="120" r="2" fill="#FFAA2C" opacity="0.4"/>

  <!-- ravens (Huginn & Muninn) -->
  <path d="M108 148 Q132 108 168 124 Q140 132 128 156 Z" fill="#1e1a35" stroke="#00D4FF" stroke-width="3" opacity="0.85"/>
  <path d="M404 148 Q380 108 344 124 Q372 132 384 156 Z" fill="#1e1a35" stroke="#7C6FFF" stroke-width="3" opacity="0.85"/>
  <circle cx="152" cy="132" r="5" fill="#00D4FF"/>
  <circle cx="360" cy="132" r="5" fill="#7C6FFF"/>

  <!-- eye glow -->
  <circle cx="256" cy="268" r="168" fill="url(#eyeGlow)"/>

  <!-- outer orbit ring -->
  <circle cx="256" cy="268" r="148" fill="none" stroke="url(#ring)" stroke-width="10" opacity="0.35" filter="url(#glow)"/>
  <path d="M256 120 A148 148 0 1 1 120 268" fill="none" stroke="url(#ring)" stroke-width="12" stroke-linecap="round" filter="url(#glow)"/>
  <path d="M256 416 A148 148 0 0 1 392 268" fill="none" stroke="url(#ring)" stroke-width="8" stroke-linecap="round" opacity="0.5"/>

  <!-- all-seeing eye -->
  <ellipse cx="256" cy="268" rx="132" ry="88" fill="none" stroke="url(#ring)" stroke-width="14" filter="url(#glow)"/>
  <ellipse cx="256" cy="268" rx="88" ry="56" fill="#0d1020" stroke="#00D4FF" stroke-width="4" opacity="0.9"/>
  <circle cx="256" cy="268" r="34" fill="#00D4FF" filter="url(#glow)"/>
  <circle cx="256" cy="268" r="14" fill="#07090f"/>
  <circle cx="246" cy="258" r="6" fill="#ffffff" opacity="0.55"/>

  <!-- rune accent -->
  <path d="M256 196 V228 M240 212 H272" stroke="#FFAA2C" stroke-width="5" stroke-linecap="round" opacity="0.7"/>

  <!-- letter O hint at bottom -->
  <text x="256" y="430" text-anchor="middle" font-family="Orbitron, system-ui, sans-serif" font-size="52" font-weight="900" fill="#00D4FF" opacity="0.22" letter-spacing="0.2em">ODIN</text>
</svg>
