<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Freya">
  <defs>
    <radialGradient id="moon" cx="78%" cy="18%" r="28%">
      <stop offset="0%" stop-color="#FFE9A8"/>
      <stop offset="100%" stop-color="#FFE9A800"/>
    </radialGradient>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1035"/>
      <stop offset="100%" stop-color="#07090f"/>
    </linearGradient>
    <linearGradient id="chariot" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7C6FFF"/>
      <stop offset="100%" stop-color="#FFAA2C"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="96" fill="url(#sky)"/>
  <circle cx="400" cy="96" r="48" fill="url(#moon)" opacity="0.9"/>
  <circle cx="400" cy="96" r="36" fill="#FFF3C4" opacity="0.85"/>

  <!-- stars -->
  <circle cx="88" cy="72" r="3" fill="#00D4FF" opacity="0.7"/>
  <circle cx="140" cy="48" r="2" fill="#00D4FF" opacity="0.5"/>
  <circle cx="320" cy="56" r="2.5" fill="#00D4FF" opacity="0.6"/>

  <!-- chariot body -->
  <path d="M96 320 H416 L392 280 H120 Z" fill="url(#chariot)" opacity="0.95" filter="url(#glow)"/>
  <path d="M112 280 H400 L384 248 H128 Z" fill="#5a4fd4" opacity="0.9"/>
  <rect x="176" y="248" width="160" height="32" rx="8" fill="#3d3580"/>

  <!-- wheels -->
  <circle cx="160" cy="340" r="44" fill="none" stroke="#FFAA2C" stroke-width="10"/>
  <circle cx="160" cy="340" r="8" fill="#FFAA2C"/>
  <circle cx="352" cy="340" r="44" fill="none" stroke="#FFAA2C" stroke-width="10"/>
  <circle cx="352" cy="340" r="8" fill="#FFAA2C"/>

  <!-- pole / reins -->
  <line x1="256" y1="248" x2="256" y2="168" stroke="#FFAA2C" stroke-width="6" stroke-linecap="round"/>
  <path d="M256 168 Q220 152 196 176" fill="none" stroke="#00D4FF" stroke-width="5" stroke-linecap="round"/>
  <path d="M256 168 Q292 152 316 176" fill="none" stroke="#00D4FF" stroke-width="5" stroke-linecap="round"/>

  <!-- cat driver -->
  <ellipse cx="256" cy="210" rx="52" ry="46" fill="#A78BFA"/>
  <ellipse cx="256" cy="218" rx="40" ry="34" fill="#C4B5FD"/>
  <!-- ears -->
  <path d="M214 178 L228 148 L242 182 Z" fill="#A78BFA"/>
  <path d="M298 178 L284 148 L270 182 Z" fill="#A78BFA"/>
  <path d="M220 176 L228 158 L236 178 Z" fill="#F472B6"/>
  <path d="M292 176 L284 158 L276 178 Z" fill="#F472B6"/>
  <!-- eyes -->
  <ellipse cx="238" cy="212" rx="8" ry="10" fill="#0B0D17"/>
  <ellipse cx="274" cy="212" rx="8" ry="10" fill="#0B0D17"/>
  <circle cx="240" cy="210" r="3" fill="#00D4FF"/>
  <circle cx="276" cy="210" r="3" fill="#00D4FF"/>
  <!-- nose & smile -->
  <path d="M256 224 L252 228 H260 Z" fill="#F472B6"/>
  <path d="M246 234 Q256 242 266 234" fill="none" stroke="#0B0D17" stroke-width="3" stroke-linecap="round"/>
  <!-- whiskers -->
  <line x1="220" y1="222" x2="196" y2="218" stroke="#EDE9FE" stroke-width="2" opacity="0.8"/>
  <line x1="220" y1="228" x2="194" y2="230" stroke="#EDE9FE" stroke-width="2" opacity="0.8"/>
  <line x1="292" y1="222" x2="316" y2="218" stroke="#EDE9FE" stroke-width="2" opacity="0.8"/>
  <line x1="292" y1="228" x2="318" y2="230" stroke="#EDE9FE" stroke-width="2" opacity="0.8"/>
  <!-- paws on reins -->
  <ellipse cx="236" cy="248" rx="14" ry="10" fill="#C4B5FD"/>
  <ellipse cx="276" cy="248" rx="14" ry="10" fill="#C4B5FD"/>

  <!-- spark trail -->
  <circle cx="128" cy="360" r="6" fill="#00D4FF" opacity="0.5"/>
  <circle cx="96" cy="380" r="4" fill="#7C6FFF" opacity="0.4"/>
  <circle cx="416" cy="360" r="6" fill="#00D4FF" opacity="0.5"/>
</svg>
